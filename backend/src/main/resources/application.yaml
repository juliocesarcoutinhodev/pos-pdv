spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:${spring.datasource.url}}
    user: ${SPRING_FLYWAY_USER:${spring.datasource.username}}
    password: ${SPRING_FLYWAY_PASSWORD:${spring.datasource.password}}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [pospdv,${spring.profiles.active:default}] [%X{correlationId:-}] %logger{36} - %msg%n'
  level:
    br.com.topone: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

security:
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:pospdv}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}
  refresh-cookie:
    max-age: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

app:
  rate-limit:
    enabled: true
    cache:
      expiry-minutes: 10
      maximum-size: 100000
    auth:
      capacity: 5
      refill-tokens: 5
      refill-duration-minutes: 1
    default-config:
      capacity: 100
      refill-tokens: 100
      refill-duration-minutes: 1
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Correlation-Id
    exposed-headers: X-Correlation-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Retry-After-Seconds,Retry-After
    max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE:health,info}
  endpoint:
    health:
      show-details: when-authorized
