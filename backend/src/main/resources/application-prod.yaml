# Production profile

spring:
  servlet:
    context-path: /pospdv
  jpa:
    show-sql: false
  web:
    error:
      include-message: never
      include-binding-errors: never
      include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: WARN
    br.com.topone: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

security:
  jwt:
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}
  refresh-cookie:
    enabled: true
    domain: ${REFRESH_COOKIE_DOMAIN:}
    secure: true
    same-site: None
