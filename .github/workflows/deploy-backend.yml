name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pospdv-backend:${{ github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy
        env:
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=accept-new \
              -o IdentitiesOnly=yes \
              -i ~/.ssh/id_rsa \
              -p "${VPS_PORT}" "${{ secrets.VPS_USER }}"@vps7348.integrator.host bash -s << EOF
            set -euo pipefail

            APP_DIR="/opt/apps/pospdv"
            mkdir -p "\${APP_DIR}"

            printf '%s\n' "${{ secrets.ENV_PROD_FILE }}" > "\${APP_DIR}/.env"

            docker stop pospdv 2>/dev/null || true
            docker rm pospdv 2>/dev/null || true

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "ghcr.io/juliocesarcoutinhodev/pospdv-backend:${{ github.sha }}"

            docker run -d \
              --name pospdv \
              --restart unless-stopped \
              --network infra_app-network \
              --env-file "\${APP_DIR}/.env" \
              "ghcr.io/juliocesarcoutinhodev/pospdv-backend:${{ github.sha }}"

            echo "Deployed"
          EOF
