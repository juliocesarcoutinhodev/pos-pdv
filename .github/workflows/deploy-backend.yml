name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend
  CONTAINER: pospdv
  NETWORK: infra_app-network

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          ssh-keyscan -H vps7348.integrator.host >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -o StrictHostKeyChecking=no -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@vps7348.integrator.host << REMOTE_SCRIPT
            set -euo pipefail

            IMAGE="${IMAGE}"
            CONTAINER="${CONTAINER}"
            NETWORK="${NETWORK}"
            TOKEN="${GITHUB_TOKEN}"
            ACTOR="${GITHUB_ACTOR}"
            ENV_CONTENT='${{ secrets.ENV_PROD_FILE }}'

            APP_DIR="/opt/apps/pospdv"
            mkdir -p "\$APP_DIR"

            # Write .env on VPS
            printf '%s\n' "\$ENV_CONTENT" > "\$APP_DIR/.env"

            # Stop old container
            docker stop "\$CONTAINER" 2>/dev/null || true
            docker rm "\$CONTAINER" 2>/dev/null || true

            # Pull new image
            echo "\$TOKEN" | docker login ghcr.io -u "\$ACTOR" --password-stdin
            docker pull "\$IMAGE"

            # Start container
            docker run -d \
              --name "\$CONTAINER" \
              --restart unless-stopped \
              --network "\$NETWORK" \
              --env-file "\$APP_DIR/.env" \
              "\$IMAGE"

            echo "Deployed \$IMAGE"
          REMOTE_SCRIPT
        env:
          IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          CONTAINER: ${{ env.CONTAINER }}
          NETWORK: ${{ env.NETWORK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
