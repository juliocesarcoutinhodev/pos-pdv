name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend
  CONTAINER: pospdv-backend
  APP_DIR: /opt/apps/pospdv-backend

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Copy .env.prod then deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: vps7348.integrator.host
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            mkdir -p ${{ env.APP_DIR }}

            # Create .env from repo .env.prod content
            printf '%s\n' '${{ secrets.ENV_PROD_FILE }}' > ${{ env.APP_DIR }}/.env

            # Create docker-compose.yml
            cat > ${{ env.APP_DIR }}/docker-compose.yml << EOF
            services:
              backend:
                container_name: ${{ env.CONTAINER }}
                image: ${{ env.IMAGE }}:${{ github.sha }}
                restart: unless-stopped
                ports:
                  - "8081:8080"
                env_file:
                  - .env
            EOF

            # Login, pull, restart
            cd ${{ env.APP_DIR }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose pull backend 2>/dev/null || true
            docker compose down
            docker compose up -d

            echo "Deployed ${{ env.IMAGE }}:${{ github.sha }}"
