name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pospdv-backend
          tags: type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend:${{ github.sha }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          ENV_FILE: ${{ secrets.ENV_PROD_FILE }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=accept-new \
              -o IdentitiesOnly=yes \
              -i ~/.ssh/id_rsa \
              -p "${VPS_PORT}" "${VPS_USER}"@vps7348.integrator.host bash -s << EOF
            set -euo pipefail

            APP_DIR="/opt/apps/pospdv"
            mkdir -p "\${APP_DIR}"

            printf '%s\n' "${ENV_FILE}" > "\${APP_DIR}/.env"

            docker stop pospdv 2>/dev/null || true
            docker rm pospdv 2>/dev/null || true

            echo "\${TOKEN}" | docker login ghcr.io -u "\${ACTOR}" --password-stdin
            docker pull "\${IMAGE}"

            docker run -d \
              --name pospdv \
              --restart unless-stopped \
              --network infra_app-network \
              --env-file "\${APP_DIR}/.env" \
              "\${IMAGE}"

            echo "Deployed \${IMAGE}"
          EOF
