name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend
  CONTAINER: pospdv
  NETWORK: infra_app-network

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: vps7348.integrator.host
          username: topone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE }}:${{ github.sha }}"
            CONTAINER="pospdv"
            NETWORK="infra_app-network"
            ENV_CONTENT='${{ secrets.ENV_PROD_FILE }}'
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            GH_ACTOR="${{ github.actor }}"

            APP_DIR="/opt/apps/pospdv"
            mkdir -p "$APP_DIR"

            printf '%s\n' "$ENV_CONTENT" > "$APP_DIR/.env"

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE"

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network "$NETWORK" \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            echo "Deployed $IMAGE"
