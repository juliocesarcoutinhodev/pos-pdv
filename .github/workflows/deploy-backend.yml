name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend
  CONTAINER: pospdv
  NETWORK: infra_app-network

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: vps7348.integrator.host
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE }}:${{ github.sha }}"

            # Write .env on VPS from secret
            APP_DIR="/opt/apps/pospdv"
            mkdir -p "$APP_DIR"
            printf '%s\n' '${{ secrets.ENV_PROD_FILE }}' > "$APP_DIR/.env"

            # Stop and remove old container
            docker stop ${{ env.CONTAINER }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER }} 2>/dev/null || true

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"

            # Run
            docker run -d \
              --name ${{ env.CONTAINER }} \
              --restart unless-stopped \
              --network ${{ env.NETWORK }} \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            echo "Deployed ${IMAGE}"
