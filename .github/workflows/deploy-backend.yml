name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pospdv-backend
  CONTAINER: pospdv
  NETWORK: infra_app-network

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: vps7348.integrator.host
          username: ${{ secrets.VPS_USER }}
          key_path: ~/.ssh/deploy_key
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE }}:${{ github.sha }}"

            APP_DIR="/opt/apps/pospdv"
            mkdir -p "$APP_DIR"

            # Write .env from secret (single-line in secret)
            printf '%s\n' '${{ secrets.ENV_PROD_FILE }}' > "$APP_DIR/.env"

            # Stop old container
            docker stop ${{ env.CONTAINER }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER }} 2>/dev/null || true

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"

            # Start container
            docker run -d \
              --name ${{ env.CONTAINER }} \
              --restart unless-stopped \
              --network ${{ env.NETWORK }} \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            echo "Deployed ${IMAGE}"
